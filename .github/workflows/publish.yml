name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Verify package contents
        run: pnpm pack

  publish:
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          # NOTE: no registry-url - it injects NODE_AUTH_TOKEN placeholder
          # which poisons OIDC auth (actions/setup-node#1440)
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$VERSION" != "$CURRENT" ]; then
            pnpm version "$VERSION" --no-git-tag-version
          fi
      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          if [[ "$TAG" =~ -dev\. ]]; then
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" =~ -(rc|beta|alpha)\. ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm (OIDC provenance)
        run: npm publish --access public --provenance --tag ${{ steps.dist-tag.outputs.tag }}

  preview:
    name: Preview (pkg-pr-new)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - run: pnpm dlx pkg-pr-new publish --compact --bin
